# Builds the grayskl.com/puente-la-divide version of the app on every push
# and stages the static output to the `site-live` branch — same pattern as
# the grayskl-site showcase.
#
# This workflow NEVER touches the droplet. Deploys are manual and
# deliberate: on Sara's say-so, the droplet runs puente-pull.sh
# (grayskl-site: infra/scripts/puente-pull.sh) to fetch site-live into the
# folder nginx serves at grayskl.com/puente-la-divide.
name: Stage grayskl.com subsite

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stage-grayskl
  cancel-in-progress: true

jobs:
  build-and-stage:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — the build stamp (astro.config.mjs) counts commits
      # for its unique build number; a shallow clone would always say 1.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Same number + hash the app displays, reused for the site-live commit
      # message below so every staged update is traceable to its commit.
      - id: rev
        run: echo "tag=v$(git rev-list --count HEAD) $(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # grayskl.com serves the app under /puente-la-divide (lowercase —
      # distinct from GitHub Pages' /Puente-la-divide).
      - run: npm run build
        env:
          ASTRO_BASE: /puente-la-divide

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: site-live
          publish_dir: dist
          force_orphan: true
          commit_message: 'stage: grayskl.com subsite ${{ steps.rev.outputs.tag }}'
