# Paste inside the grayskl.com `server { ... }` block (the 443 one), ABOVE
# the showcase's `location / { ... }` catch-all, then reload nginx.
#
# Puente la Divide subsite — its own site, deployed independently by
# puente-pull.sh from this repo's site-live branch. The ^~ makes these
# win over the showcase's catch-all.

location = /puente-la-divide {
    return 301 /puente-la-divide/;
}
location ^~ /puente-la-divide/ {
    alias /var/www/puente-la-divide/current/;
    try_files $uri $uri/ =404;
}
